<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Error {{ codigo }} — CreditosPro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f8f9fb;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#111827;}
.box{text-align:center;padding:48px;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.08);max-width:420px;}
.code{font-size:72px;font-weight:700;color:#e5e7eb;line-height:1;}
.msg{font-size:18px;font-weight:600;margin:16px 0 8px;}
.sub{font-size:14px;color:#6b7280;margin-bottom:28px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:#1a6b4a;color:#fff;border-radius:8px;text-decoration:none;font-weight:500;}
</style>
</head>
<body>
<div class="box">
  <div class="code">{{ codigo }}</div>
  <div class="msg">{% if codigo == 403 %}Sin acceso{% elif codigo == 404 %}No encontrado{% else %}Error{% endif %}</div>
  <div class="sub">{{ mensaje }}</div>
  <a href="/" class="btn">← Volver al inicio</a>
</div>
</body>
</html>
